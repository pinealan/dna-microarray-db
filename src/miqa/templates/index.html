{% extends "base.html" %}

{% block content %}
<div class="app-header">
  <h1>Normalisation Rules</h1>

  <div x-data="{ loading: false, result: null }">
    <button
      class="primary"
      :disabled="loading"
      @click="
        loading = true;
        result = null;
        fetch('/apply', { method: 'POST' })
          .then(r => r.json())
          .then(d => { result = d.updated; loading = false; })
          .catch(() => { loading = false; });
      "
    >
      <span x-show="!loading">Apply All Rules</span>
      <span x-show="loading">Applying&hellip;</span>
    </button>
    <span
      class="toast"
      x-show="result !== null"
      x-text="'Updated ' + result + ' sample' + (result === 1 ? '' : 's')"
    ></span>
  </div>
</div>

<div class="layout" style="margin-bottom:3.5rem;">

  <!-- Left: Rules panel -->
  <div class="panel">
    <h2>Rules</h2>

    <label style="font-size:0.8rem;color:#555;">Filter by target:</label>
    <select
      style="width:auto;margin-bottom:0.75rem;"
      hx-get="/rules"
      hx-trigger="change"
      hx-target="#rule-list"
      hx-swap="innerHTML"
      name="target"
    >
      <option value="">— all —</option>
      <option value="tissue">tissue</option>
      <option value="disease">disease</option>
      <option value="gender">gender</option>
      <option value="age">age</option>
      <option value="extraction_protocol">extraction_protocol</option>
    </select>

    <div id="rule-list">
      {% include "partials/rule_list.html" %}
    </div>
  </div>

  <!-- Right: Preview panel -->
  <div class="panel">
    <h2>Preview</h2>

    <div id="preview-controls" style="display:flex;flex-wrap:wrap;gap:0.75rem;align-items:flex-end;margin-bottom:0.75rem;">
      <div>
        <label style="font-size:0.8rem;color:#555;display:block;">Source attribute</label>
        <select
          style="width:auto;"
          name="source"
          hx-get="/preview"
          hx-trigger="change"
          hx-target="#preview-table"
          hx-swap="innerHTML"
          hx-include="#preview-controls"
        >
          <option value="tissue" {% if preview_source == 'tissue' %}selected{% endif %}>tissue</option>
          <option value="disease" {% if preview_source == 'disease' %}selected{% endif %}>disease</option>
          <option value="gender" {% if preview_source == 'gender' %}selected{% endif %}>gender</option>
          <option value="age" {% if preview_source == 'age' %}selected{% endif %}>age</option>
          <option value="extract_protocol_ch1" {% if preview_source == 'extract_protocol_ch1' %}selected{% endif %}>extraction protocol</option>
          <option value="label_protocol_ch1" {% if preview_source == 'label_protocol_ch1' %}selected{% endif %}>label protocol</option>
          <option value="scan_protocol" {% if preview_source == 'scan_protocol' %}selected{% endif %}>scan protocol</option>
          <option value="series_design" {% if preview_source == 'series_design' %}selected{% endif %}>design</option>
        </select>
      </div>
      <div style="flex:1;min-width:200px;">
        <label style="font-size:0.8rem;color:#555;display:block;">Filter by sample IDs (comma-separated)</label>
        <input
          type="text"
          name="ids"
          placeholder="e.g. GSM123456, GSM789012"
          hx-get="/preview"
          hx-trigger="input delay:400ms, change"
          hx-target="#preview-table"
          hx-swap="innerHTML"
          hx-include="#preview-controls"
        />
      </div>
    </div>

    <div id="preview-table">
      {% include "partials/preview_table.html" %}
    </div>
  </div>

</div>

<!-- Sample Inspector: fixed floating strip at the bottom of the viewport -->
<div
  class="inspector-float"
  x-data="{
    metadata: null,
    loading: false,
    error: null,
    fetchSample(id) {
      if (!id) { this.metadata = null; this.error = null; return; }
      this.loading = true;
      this.metadata = null;
      this.error = null;
      fetch('/sample/inspect?id=' + encodeURIComponent(id))
        .then(r => r.ok ? r.json() : Promise.reject(r.status))
        .then(d => {
          this.metadata = d;
          this.loading = false;
          this.$nextTick(() => {
            this.$refs.codeEl.textContent = JSON.stringify(d, null, 2);
            Prism.highlightElement(this.$refs.codeEl);
          });
        })
        .catch(() => { this.error = 'Sample not found'; this.loading = false; });
    }
  }"
  x-init="$watch('$store.inspector.sampleId', id => fetchSample(id))"
>
  <!-- Always-visible header row -->
  <div style="display:flex;gap:0.5rem;align-items:center;flex-shrink:0;">
    <span style="font-size:0.8rem;font-weight:600;color:#555;white-space:nowrap;">Sample Inspector</span>
    <input
      type="text"
      placeholder="Sample ID — or click a row in the preview table"
      :value="$store.inspector.sampleId"
      @input.debounce.300ms="$store.inspector.sampleId = $event.target.value"
      style="flex:1;"
    />
    <button x-show="$store.inspector.sampleId" @click="$store.inspector.sampleId = ''">Clear</button>
  </div>

  <!-- Expandable body: shown only when a sample ID is entered -->
  <div class="inspector-body" x-show="$store.inspector.sampleId" style="display:none;">
    <p x-show="loading" style="color:#555;font-size:0.875rem;margin:0;">Loading&hellip;</p>
    <p x-show="error && !loading" x-text="error" style="color:#d93025;font-size:0.875rem;margin:0;"></p>
    <!-- x-show keeps codeEl in the DOM so $refs is always available -->
    <pre class="language-json json-viewer" x-show="metadata" style="display:none;"><code class="language-json" x-ref="codeEl"></code></pre>
  </div>
</div>
{% endblock %}
