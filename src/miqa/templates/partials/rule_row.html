<tr class="rule-row" id="rule-{{ rule.id }}" x-data="{ editing: false }">
  <!-- View mode: individual cells, hidden while editing -->
  <td x-show="!editing">{{ rule.source_attribute }}</td>
  <td x-show="!editing">→</td>
  <td x-show="!editing">{{ rule.target_attribute }}</td>
  <td x-show="!editing"><code>{{ rule.pattern }}</code></td>
  <td x-show="!editing"><span class="badge">{{ rule.rule_type }}</span></td>
  <td x-show="!editing">{{ rule.priority }}</td>
  <td x-show="!editing" class="actions">
    <button @click="editing = true">Edit</button>
    <button
      class="danger"
      hx-delete="/rules/{{ rule.rule_id }}"
      hx-target="#rule-list"
      hx-swap="innerHTML"
      hx-confirm="Delete this rule?"
    >Delete</button>
  </td>
  <!-- Edit mode: single spanning cell, hidden while viewing -->
  <td colspan="7" x-show="editing" style="padding:0;">
    {% include "partials/rule_row_edit.html" %}
  </td>
</tr>
